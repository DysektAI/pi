name: Auto-release on push to local

# Every push to the `local` branch creates a GitHub Release so
# `pi update --self` detects it (via the fork's GitHub Releases API
# in version-check.ts). The version scheme is:
#
#   v{package.json version}.local.{GITHUB_RUN_NUMBER}
#
# The .local.N suffix makes this invalid semver (period after patch is
# not allowed), so semver valid() returns null, compare() returns undefined,
# and isNewerPackageVersion falls back to string comparison — correctly
# detecting the release as newer than the base version.
#
# After creating the release, the CI bumps package.json to the same version
# and commits with [skip ci] so machines that `pi update` (git pull) get
# the version bump and stop seeing the update prompt.

on:
  push:
    branches: [local]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: local

      - name: Read version from package.json
        id: version
        run: |
          BASE_VERSION=$(node -p "require('./packages/coding-agent/package.json').version")
          TAG="v${BASE_VERSION}.local.${GITHUB_RUN_NUMBER}"
          FULL_VERSION="${BASE_VERSION}.local.${GITHUB_RUN_NUMBER}"
          echo "base=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "full=$FULL_VERSION" >> $GITHUB_OUTPUT
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.base }}
        run: |
          git tag "$TAG"
          git push origin "$TAG"

          # Changelog: list commits since last release tag
          LAST_TAG=$(git tag --sort=-v:refname | grep -v "$TAG" | head -1)
          if [ -n "$LAST_TAG" ]; then
            RANGE="${LAST_TAG}..${TAG}"
          else
            RANGE="$TAG"
          fi

          COMMITS=$(git log "$RANGE" --oneline --no-merges | head -20)

          gh release create "$TAG" \
            --title "pi ${VERSION} — local build ${GITHUB_RUN_NUMBER}" \
            --notes "Auto-released from push to \`local\`.

          **Base version:** ${VERSION}
          **Build number:** ${GITHUB_RUN_NUMBER}

          ## Changes since last release

          \`\`\`
          ${COMMITS:-first release}
          \`\`\`"

      - name: Bump package.json version
        env:
          FULL_VERSION: ${{ steps.version.outputs.full }}
        run: |
          # Bump the coding-agent package.json so pi --version reflects
          # the release version after a git pull. [skip ci] prevents recursion.
          node -e "
            const pkg = require('./packages/coding-agent/package.json');
            pkg.version = '${FULL_VERSION}';
            require('fs').writeFileSync('./packages/coding-agent/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add packages/coding-agent/package.json
          git commit -m "chore: bump version to ${FULL_VERSION} [skip ci]"
          git push origin local
